<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lens Blur Analyser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:        #0a0c0f;
    --bg2:       #111318;
    --bg3:       #181b22;
    --border:    #23272f;
    --border2:   #2e3340;
    --text:      #d4d8e2;
    --text2:     #7a8094;
    --text3:     #454c5e;
    --accent:    #4af0a0;
    --accent2:   #2ad080;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Syne', sans-serif;
    /* lens colours */
    --c0: #4af0a0; --c1: #f06060; --c2: #60b4f0; --c3: #f0c040;
    --c4: #c060f0; --c5: #f08040; --c6: #40d0d0; --c7: #f040a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 28px 16px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #fff;
  }
  header .sub {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .version {
    margin-left: auto;
    font-size: 10px;
    color: var(--text3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 2px 7px;
    letter-spacing: 0.06em;
  }

  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  /* ── LEFT PANEL ── */
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .section-head {
    padding: 14px 20px 10px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 2;
  }

  /* global settings */
  .global-panel {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .global-panel .full { grid-column: 1/-1; }

  .field-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  input[type=number], input[type=text], select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 9px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent2); }
  select option { background: var(--bg3); }

  /* lens cards */
  .lenses-panel { padding: 12px 16px; flex: 1; }

  .lens-card {
    border: 1px solid var(--border2);
    border-radius: 6px;
    margin-bottom: 10px;
    overflow: hidden;
    position: relative;
  }
  .lens-card-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg3);
    cursor: pointer;
    user-select: none;
  }
  .lens-swatch {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .lens-name-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 0;
    cursor: text;
  }
  .lens-name-input:focus { outline: none; }
  .lens-toggle {
    width: 16px; height: 16px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--text2);
    font-size: 10px;
    transition: background 0.15s, color 0.15s;
  }
  .lens-toggle.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .lens-remove {
    background: transparent; border: none;
    color: var(--text3); cursor: pointer;
    font-size: 14px; line-height: 1; padding: 0 2px;
    transition: color 0.15s;
  }
  .lens-remove:hover { color: #f06060; }

  .lens-body {
    padding: 10px 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .lens-body .full { grid-column: 1/-1; }

  .add-lens-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border2);
    border-radius: 6px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
    padding: 9px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    letter-spacing: 0.04em;
  }
  .add-lens-btn:hover { border-color: var(--accent2); color: var(--accent); }

  /* normalisation selector */
  .norm-panel {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: grid;
    gap: 8px;
  }

  /* ── RIGHT PANEL ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .chart-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    padding: 20px 24px 12px 20px;
  }

  canvas#blurPlot {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* tooltip */
  .tooltip {
    position: absolute;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text);
    pointer-events: none;
    display: none;
    z-index: 10;
    min-width: 160px;
    line-height: 1.8;
  }

  /* stats bar */
  .stats-bar {
    border-top: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    gap: 24px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .stat-item { flex-shrink: 0; }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-val { font-size: 12px; color: var(--text); }
  .stat-val span { font-weight: 600; }

  /* tab strip for normalisation */
  .tab-strip {
    display: flex;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 6px;
    cursor: pointer;
    text-align: center;
    letter-spacing: 0.03em;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .checkbox-row {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
  }
  .checkbox-row input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; }
  .checkbox-row label { font-size: 11px; color: var(--text2); cursor: pointer; }

  /* scrollbar for sidebar */
  .sidebar { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
</style>
</head>
<body>

<header>
  <h1>Lens Blur Analyser</h1>
  <span class="sub">Blur disc · Depth of field · Format comparison</span>
  <span class="version">v1.0</span>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="section-head">Global Settings</div>
    <div class="global-panel">
      <div class="full">
        <div class="field-label">Focus distance (m)</div>
        <input type="number" id="gFocus" value="5" min="0.1" max="1000" step="0.1">
      </div>
      <div>
        <div class="field-label">Plot from (m)</div>
        <input type="number" id="gNear" value="1" min="0.1" max="999" step="0.1">
      </div>
      <div>
        <div class="field-label">Plot to (m)</div>
        <input type="number" id="gFar" value="50" min="1" max="10000" step="1">
      </div>
      <div class="full">
        <div class="field-label">Plot scale</div>
        <select id="gScale">
          <option value="linear">Linear distance</option>
          <option value="log" selected>Logarithmic distance</option>
        </select>
      </div>
    </div>

    <div class="section-head">Lenses</div>
    <div class="lenses-panel" id="lensesPanel"></div>

    <div class="norm-panel">
      <div class="field-label">Blur normalisation</div>
      <div class="tab-strip" id="normTabs">
        <button class="tab-btn" data-norm="mm">mm on sensor</button>
        <button class="tab-btn active" data-norm="px">pixels</button>
        <button class="tab-btn" data-norm="frac">fraction of diagonal</button>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="chkDof" checked>
        <label for="chkDof">Show depth of field zone</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="chkThresh" checked>
        <label for="chkThresh">Show CoC threshold line</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="chkDiff" checked>
        <label for="chkDiff">Show diffraction limit</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="chkHyper">
        <label for="chkHyper">Show hyperfocal markers</label>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="chart-area" id="chartArea">
      <canvas id="blurPlot"></canvas>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="stats-bar" id="statsBar"></div>
  </main>
</div>

<script>
// ─── SENSOR DATABASE ───────────────────────────────────────────────────────────
const SENSORS = [
  { label: 'Medium Format — Hasselblad X2D / CFV 100C (43.8×32.9mm)', w:43.8, h:32.9, mp:100, crop:0.79 },
  { label: 'Medium Format — Phase One IQ4 (53.4×40mm)',                w:53.4, h:40,   mp:150, crop:0.64 },
  { label: 'Medium Format — Fujifilm GFX 100S (43.8×32.9mm)',          w:43.8, h:32.9, mp:102, crop:0.79 },
  { label: 'Medium Format — Fujifilm GFX 50S (43.8×32.9mm)',           w:43.8, h:32.9, mp:51,  crop:0.79 },
  { label: 'Full Frame — 36×24mm (24MP)',                               w:36,   h:24,   mp:24,  crop:1.0  },
  { label: 'Full Frame — 36×24mm (45MP)',                               w:36,   h:24,   mp:45,  crop:1.0  },
  { label: 'Full Frame — 36×24mm (61MP)',                               w:36,   h:24,   mp:61,  crop:1.0  },
  { label: 'APS-C Fujifilm — 23.5×15.6mm (26MP)',                      w:23.5, h:15.6, mp:26,  crop:1.53 },
  { label: 'APS-C Fujifilm — 23.5×15.6mm (40MP)',                      w:23.5, h:15.6, mp:40,  crop:1.53 },
  { label: 'APS-C Canon — 22.3×14.9mm (24MP)',                         w:22.3, h:14.9, mp:24,  crop:1.61 },
  { label: 'APS-C Nikon/Sony — 23.6×15.7mm (24MP)',                    w:23.6, h:15.7, mp:24,  crop:1.53 },
  { label: 'Micro Four Thirds — 17.3×13mm (20MP)',                     w:17.3, h:13,   mp:20,  crop:2.0  },
  { label: 'Micro Four Thirds — 17.3×13mm (25MP)',                     w:17.3, h:13,   mp:25,  crop:2.0  },
  { label: '1-inch — 13.2×8.8mm (20MP)',                               w:13.2, h:8.8,  mp:20,  crop:2.72 },
  { label: 'Custom…',                                                   w:36,   h:24,   mp:24,  crop:1.0, custom:true },
];

const LENS_COLORS = ['#4af0a0','#f06060','#60b4f0','#f0c040','#c060f0','#f08040','#40d0d0','#f040a0'];

// ─── STATE ────────────────────────────────────────────────────────────────────
let lenses = [];
let lensIdCounter = 0;
let normMode = 'px'; // mm | px | frac
let animFrame = null;

// ─── SENSOR HELPERS ───────────────────────────────────────────────────────────
function sensorPixelPitch(sensor) {
  // pitch in mm from megapixels + dimensions
  const totalPx = sensor.mp * 1e6;
  const aspect = sensor.w / sensor.h;
  const ph = Math.sqrt(totalPx / aspect);
  const pw = aspect * ph;
  return sensor.w / pw; // mm per pixel
}

function sensorDiagonal(sensor) {
  return Math.sqrt(sensor.w * sensor.w + sensor.h * sensor.h);
}

function cocThreshold(sensor) {
  // standard: diagonal / 1500
  return sensorDiagonal(sensor) / 1500;
}

// ─── OPTICS MATHS ─────────────────────────────────────────────────────────────
function blurDiscMm(f_mm, N, focusDist_m, subjectDist_m) {
  // All distances to mm
  const s = focusDist_m * 1000;
  const d = subjectDist_m * 1000;
  if (d <= f_mm) return 0; // behind lens
  // blur disc: |f²*(s-d)| / (N * s * (d - f))  ... standard derivation
  // For out-of-focus: C = (f/N) * |1/s - 1/d| * f / (1 - f/d)
  // Precise form:
  const imgPlane = (f_mm * s) / (s - f_mm); // image distance for focus point
  const imgD     = (f_mm * d) / (d - f_mm); // image distance for subject
  const blurRaw  = Math.abs(imgD - imgPlane) * (f_mm / N) / imgD;
  return blurRaw; // mm on sensor
}

function blurDisc(f_mm, N, focusDist_m, subjectDist_m, sensor) {
  const mm = blurDiscMm(f_mm, N, focusDist_m, subjectDist_m);
  if (normMode === 'mm') return mm;
  if (normMode === 'px') return mm / sensorPixelPitch(sensor);
  if (normMode === 'frac') return mm / sensorDiagonal(sensor);
  return mm;
}

function cocThresholdNorm(sensor) {
  const coc_mm = cocThreshold(sensor);
  if (normMode === 'mm') return coc_mm;
  if (normMode === 'px') return coc_mm / sensorPixelPitch(sensor);
  if (normMode === 'frac') return coc_mm / sensorDiagonal(sensor);
  return coc_mm;
}

function airDiscMm(f_mm, N) {
  // Airy disc diameter = 2.44 * lambda * N  (lambda = 0.00055mm for green)
  return 2.44 * 0.00055 * N;
}

function airDiscNorm(f_mm, N, sensor) {
  const mm = airDiscMm(f_mm, N);
  if (normMode === 'mm') return mm;
  if (normMode === 'px') return mm / sensorPixelPitch(sensor);
  if (normMode === 'frac') return mm / sensorDiagonal(sensor);
  return mm;
}

function hyperfocalDist_m(f_mm, N, cocMm) {
  // H = f² / (N * c) + f  ≈ f²/(N*c) for large H
  return (f_mm * f_mm) / (N * cocMm) / 1000;
}

function dofLimits_m(f_mm, N, focusDist_m, cocMm) {
  const H = hyperfocalDist_m(f_mm, N, cocMm) * 1000; // to mm
  const s = focusDist_m * 1000;
  const near = (s * (H - f_mm)) / (H + s - 2 * f_mm) / 1000;
  const far  = s >= H ? Infinity : (s * (H - f_mm)) / (H - s) / 1000;
  return { near, far };
}

// ─── DISTANCE ARRAY ───────────────────────────────────────────────────────────
function makeDistances(near, far, n, logScale) {
  const pts = [];
  if (logScale) {
    const lnear = Math.log10(Math.max(near, 0.05));
    const lfar  = Math.log10(far);
    for (let i = 0; i < n; i++) {
      pts.push(Math.pow(10, lnear + (lfar - lnear) * i / (n - 1)));
    }
  } else {
    for (let i = 0; i < n; i++) {
      pts.push(near + (far - near) * i / (n - 1));
    }
  }
  return pts;
}

// ─── BUILD SENSOR SELECT ──────────────────────────────────────────────────────
function buildSensorSelect() {
  return SENSORS.map((s, i) =>
    `<option value="${i}">${s.label}</option>`
  ).join('');
}

function getSensorForLens(lens) {
  const si = parseInt(lens.sensorIdx);
  let s = SENSORS[si];
  if (s.custom) {
    s = { w: parseFloat(lens.custW)||36, h: parseFloat(lens.custH)||24, mp: parseFloat(lens.custMp)||24 };
  }
  return s;
}

// ─── LENS CARD DOM ───────────────────────────────────────────────────────────
function createLensCard(lens) {
  const color = LENS_COLORS[lens.id % LENS_COLORS.length];
  const sensorOpts = buildSensorSelect();
  const card = document.createElement('div');
  card.className = 'lens-card';
  card.dataset.id = lens.id;
  card.innerHTML = `
    <div class="lens-card-head">
      <div class="lens-swatch" style="background:${color}"></div>
      <input class="lens-name-input" type="text" value="${lens.name}" data-field="name">
      <div class="lens-toggle active" title="Toggle visibility" data-role="toggle">✓</div>
      <button class="lens-remove" title="Remove" data-role="remove">×</button>
    </div>
    <div class="lens-body">
      <div>
        <div class="field-label">Focal length (mm)</div>
        <input type="number" value="${lens.focal}" min="1" max="2000" step="1" data-field="focal">
      </div>
      <div>
        <div class="field-label">Aperture (f/)</div>
        <input type="number" value="${lens.aperture}" min="0.5" max="64" step="0.1" data-field="aperture">
      </div>
      <div class="full">
        <div class="field-label">Sensor format</div>
        <select data-field="sensorIdx">${sensorOpts}</select>
      </div>
      <div class="full custom-fields" style="display:none; grid-template-columns:1fr 1fr 1fr; gap:8px;">
        <div>
          <div class="field-label">Width (mm)</div>
          <input type="number" value="${lens.custW||36}" min="1" max="100" step="0.1" data-field="custW">
        </div>
        <div>
          <div class="field-label">Height (mm)</div>
          <input type="number" value="${lens.custH||24}" min="1" max="100" step="0.1" data-field="custH">
        </div>
        <div>
          <div class="field-label">MP</div>
          <input type="number" value="${lens.custMp||24}" min="1" max="500" step="1" data-field="custMp">
        </div>
      </div>
    </div>
  `;

  // set sensor select
  card.querySelector('[data-field=sensorIdx]').value = lens.sensorIdx;
  showHideCustom(card, lens.sensorIdx);

  // events
  card.querySelector('[data-role=toggle]').addEventListener('click', e => {
    lens.visible = !lens.visible;
    e.currentTarget.textContent = lens.visible ? '✓' : '○';
    e.currentTarget.classList.toggle('active', lens.visible);
    scheduleRedraw();
  });
  card.querySelector('[data-role=remove]').addEventListener('click', () => {
    lenses = lenses.filter(l => l.id !== lens.id);
    card.remove();
    scheduleRedraw();
  });
  card.querySelectorAll('input,select').forEach(el => {
    el.addEventListener('input', () => {
      const field = el.dataset.field;
      if (!field) return;
      lens[field] = el.type === 'number' ? parseFloat(el.value) : el.value;
      if (field === 'sensorIdx') showHideCustom(card, el.value);
      scheduleRedraw();
    });
  });

  return card;
}

function showHideCustom(card, idx) {
  const isCustom = SENSORS[parseInt(idx)]?.custom;
  const cf = card.querySelector('.custom-fields');
  cf.style.display = isCustom ? 'grid' : 'none';
}

function addLens(preset) {
  const id = lensIdCounter++;
  const lens = {
    id, visible: true,
    name: preset?.name || `Lens ${id + 1}`,
    focal: preset?.focal || 50,
    aperture: preset?.aperture || 1.8,
    sensorIdx: preset?.sensorIdx ?? 4, // Full Frame 24MP default
    custW: 36, custH: 24, custMp: 24,
  };
  lenses.push(lens);
  const panel = document.getElementById('lensesPanel');
  const addBtn = panel.querySelector('.add-lens-btn');
  const card = createLensCard(lens);
  panel.insertBefore(card, addBtn);
  scheduleRedraw();
}

// ─── CANVAS DRAWING ───────────────────────────────────────────────────────────
const canvas  = document.getElementById('blurPlot');
const ctx     = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

function unitLabel() {
  if (normMode === 'mm')   return 'mm (on sensor)';
  if (normMode === 'px')   return 'pixels';
  if (normMode === 'frac') return 'fraction of diagonal';
  return '';
}

function scheduleRedraw() {
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(draw);
}

function draw() {
  const area   = document.getElementById('chartArea');
  const W = area.clientWidth;
  const H = area.clientHeight;
  canvas.width  = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const near     = parseFloat(document.getElementById('gNear').value) || 1;
  const far      = parseFloat(document.getElementById('gFar').value)  || 50;
  const focus    = parseFloat(document.getElementById('gFocus').value)|| 5;
  const logScale = document.getElementById('gScale').value === 'log';
  const showDof  = document.getElementById('chkDof').checked;
  const showThr  = document.getElementById('chkThresh').checked;
  const showDiff = document.getElementById('chkDiff').checked;
  const showHyp  = document.getElementById('chkHyper').checked;

  const N_PTS = 400;
  const distances = makeDistances(Math.max(near, 0.05), far, N_PTS, logScale);

  // ── layout
  const pad = { top:24, right:24, bottom:48, left:72 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top  - pad.bottom;

  // ── compute all curves & find y range
  const curves = [];
  let yMax = 0;

  for (const lens of lenses) {
    if (!lens.visible) continue;
    const sensor = getSensorForLens(lens);
    const vals = distances.map(d => blurDisc(lens.focal, lens.aperture, focus, d, sensor));
    yMax = Math.max(yMax, ...vals.filter(Number.isFinite));
    curves.push({ lens, sensor, vals });
  }

  // also consider threshold / diffraction for yMax
  for (const {lens, sensor} of curves) {
    yMax = Math.max(yMax, cocThresholdNorm(sensor) * 3);
    yMax = Math.max(yMax, airDiscNorm(lens.focal, lens.aperture, sensor) * 3);
  }
  if (yMax <= 0) yMax = 1;
  yMax *= 1.15;

  // ── helpers
  const xPos = d => {
    if (logScale) {
      const lnear = Math.log10(Math.max(near, 0.05));
      const lfar  = Math.log10(far);
      return pad.left + (Math.log10(d) - lnear) / (lfar - lnear) * cw;
    }
    return pad.left + (d - near) / (far - near) * cw;
  };
  const yPos = v => pad.top + ch - (v / yMax) * ch;

  // ── clear
  ctx.clearRect(0, 0, W, H);

  // ── grid
  ctx.strokeStyle = '#1e2230';
  ctx.lineWidth = 1;
  const yTicks = 6;
  for (let i = 0; i <= yTicks; i++) {
    const y = yPos(yMax * i / yTicks);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+cw, y); ctx.stroke();
  }
  // x grid — pick nice distances
  const xGridDists = logScale
    ? [0.1,0.2,0.5,1,2,5,10,20,50,100,200,500,1000].filter(d => d>=near && d<=far)
    : (() => {
        const step = niceStep((far-near)/6);
        const pts = [];
        for (let d = Math.ceil(near/step)*step; d<=far; d+=step) pts.push(d);
        return pts;
      })();
  xGridDists.forEach(d => {
    const x = xPos(d);
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top+ch); ctx.stroke();
  });

  // ── DoF zones (filled bands)
  if (showDof) {
    curves.forEach(({lens, sensor}, ci) => {
      const color = LENS_COLORS[lens.id % LENS_COLORS.length];
      const coc_mm = cocThreshold(sensor);
      const {near:dNear, far:dFar} = dofLimits_m(lens.focal, lens.aperture, focus, coc_mm);
      const x0 = xPos(Math.max(dNear, near > 0 ? near : 0.05));
      const x1 = dFar === Infinity ? pad.left+cw : xPos(Math.min(dFar, far));
      if (x1 >= x0) {
        ctx.fillStyle = hexAlpha(color, 0.06);
        ctx.fillRect(x0, pad.top, x1-x0, ch);
        // near edge
        ctx.strokeStyle = hexAlpha(color, 0.3);
        ctx.lineWidth = 1;
        ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.moveTo(x0, pad.top); ctx.lineTo(x0, pad.top+ch); ctx.stroke();
        if (dFar < far) {
          ctx.beginPath(); ctx.moveTo(x1, pad.top); ctx.lineTo(x1, pad.top+ch); ctx.stroke();
        }
        ctx.setLineDash([]);
      }
    });
  }

  // ── focus line
  if (focus >= near && focus <= far) {
    const xf = xPos(focus);
    ctx.strokeStyle = '#3a4050';
    ctx.lineWidth = 1;
    ctx.setLineDash([6,3]);
    ctx.beginPath(); ctx.moveTo(xf, pad.top); ctx.lineTo(xf, pad.top+ch); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#454c5e';
    ctx.font = '10px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('focus', xf, pad.top+ch+14);
  }

  // ── CoC threshold lines
  if (showThr) {
    const drawn = new Set();
    curves.forEach(({lens, sensor}) => {
      const t = cocThresholdNorm(sensor);
      const key = t.toFixed(4);
      if (drawn.has(key)) return;
      drawn.add(key);
      const color = LENS_COLORS[lens.id % LENS_COLORS.length];
      const y = yPos(t);
      ctx.strokeStyle = hexAlpha(color, 0.4);
      ctx.lineWidth = 1;
      ctx.setLineDash([2,4]);
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+cw, y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = hexAlpha(color, 0.6);
      ctx.font = '9px JetBrains Mono';
      ctx.textAlign = 'left';
      ctx.fillText('CoC thr', pad.left+3, y-3);
    });
  }

  // ── diffraction lines
  if (showDiff) {
    const drawn = new Set();
    curves.forEach(({lens, sensor}) => {
      const d = airDiscNorm(lens.focal, lens.aperture, sensor);
      const key = d.toFixed(4);
      if (drawn.has(key)) return;
      drawn.add(key);
      const color = LENS_COLORS[lens.id % LENS_COLORS.length];
      const y = yPos(d);
      ctx.strokeStyle = hexAlpha(color, 0.3);
      ctx.lineWidth = 1;
      ctx.setLineDash([1,5]);
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+cw, y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = hexAlpha(color, 0.5);
      ctx.font = '9px JetBrains Mono';
      ctx.textAlign = 'left';
      ctx.fillText('diffr', pad.left+3, y-3);
    });
  }

  // ── hyperfocal markers
  if (showHyp) {
    curves.forEach(({lens, sensor}) => {
      const coc_mm = cocThreshold(sensor);
      const H = hyperfocalDist_m(lens.focal, lens.aperture, coc_mm);
      if (H >= near && H <= far) {
        const color = LENS_COLORS[lens.id % LENS_COLORS.length];
        const x = xPos(H);
        ctx.strokeStyle = hexAlpha(color, 0.5);
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top+ch); ctx.stroke();
        ctx.fillStyle = hexAlpha(color, 0.7);
        ctx.font = '9px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('H', x, pad.top+10);
      }
    });
  }

  // ── blur curves
  curves.forEach(({lens, vals}) => {
    const color = LENS_COLORS[lens.id % LENS_COLORS.length];
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.shadowColor = hexAlpha(color, 0.4);
    ctx.shadowBlur = 6;
    ctx.beginPath();
    let first = true;
    vals.forEach((v, i) => {
      if (!Number.isFinite(v)) { first = true; return; }
      const x = xPos(distances[i]);
      const y = yPos(Math.min(v, yMax));
      if (first) { ctx.moveTo(x, y); first = false; }
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.shadowBlur = 0;
  });

  // ── axes
  ctx.strokeStyle = '#2e3340';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left, pad.top+ch);
  ctx.lineTo(pad.left+cw, pad.top+ch);
  ctx.stroke();

  // y axis labels
  ctx.fillStyle = '#454c5e';
  ctx.font = '10px JetBrains Mono';
  ctx.textAlign = 'right';
  for (let i = 0; i <= yTicks; i++) {
    const v = yMax * i / yTicks;
    const y = yPos(v);
    ctx.fillText(fmtVal(v), pad.left-6, y+4);
  }

  // x axis labels
  ctx.textAlign = 'center';
  xGridDists.forEach(d => {
    ctx.fillText(fmtDist(d), xPos(d), pad.top+ch+14);
  });

  // axis titles
  ctx.save();
  ctx.translate(14, pad.top + ch/2);
  ctx.rotate(-Math.PI/2);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#454c5e';
  ctx.font = '11px JetBrains Mono';
  ctx.fillText(`Blur disc (${unitLabel()})`, 0, 0);
  ctx.restore();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#454c5e';
  ctx.font = '11px JetBrains Mono';
  ctx.fillText('Distance (m)', pad.left + cw/2, H-6);

  // ── legend
  let lx = pad.left + 10;
  const ly = pad.top + 12;
  curves.forEach(({lens}) => {
    const color = LENS_COLORS[lens.id % LENS_COLORS.length];
    ctx.fillStyle = color;
    ctx.fillRect(lx, ly-6, 18, 3);
    ctx.fillStyle = '#d4d8e2';
    ctx.font = '10px JetBrains Mono';
    ctx.textAlign = 'left';
    ctx.fillText(lens.name, lx+22, ly);
    lx += ctx.measureText(lens.name).width + 42;
  });

  // update stats bar
  updateStats(curves, focus);
}

// ─── STATS BAR ───────────────────────────────────────────────────────────────
function updateStats(curves, focus) {
  const bar = document.getElementById('statsBar');
  if (!curves.length) { bar.innerHTML = ''; return; }
  bar.innerHTML = curves.map(({lens, sensor}) => {
    const coc_mm  = cocThreshold(sensor);
    const {near, far} = dofLimits_m(lens.focal, lens.aperture, focus, coc_mm);
    const H = hyperfocalDist_m(lens.focal, lens.aperture, coc_mm);
    const bgBlur = blurDisc(lens.focal, lens.aperture, focus, 1e6, sensor);
    const color = LENS_COLORS[lens.id % LENS_COLORS.length];
    return `<div class="stat-item">
      <div class="stat-label" style="color:${color}">${lens.name}</div>
      <div class="stat-val">DoF <span>${fmtDist(near)}–${far===Infinity?'∞':fmtDist(far)}</span></div>
      <div class="stat-val">Hyp <span>${fmtDist(H)}</span> · ∞blur <span>${fmtVal(bgBlur)}</span></div>
    </div>`;
  }).join('<div style="width:1px;background:var(--border);flex-shrink:0"></div>');
}

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
document.getElementById('chartArea').addEventListener('mousemove', e => {
  const area = document.getElementById('chartArea');
  const rect  = area.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const near     = parseFloat(document.getElementById('gNear').value)||1;
  const far      = parseFloat(document.getElementById('gFar').value)||50;
  const focus    = parseFloat(document.getElementById('gFocus').value)||5;
  const logScale = document.getElementById('gScale').value === 'log';

  const pad = { top:24, right:24, bottom:48, left:72 };
  const cw = area.clientWidth - pad.left - pad.right;

  if (mx < pad.left || mx > pad.left+cw) { tooltip.style.display='none'; return; }

  let dist;
  if (logScale) {
    const lnear = Math.log10(Math.max(near,0.05));
    const lfar  = Math.log10(far);
    dist = Math.pow(10, lnear + (mx-pad.left)/cw*(lfar-lnear));
  } else {
    dist = near + (mx-pad.left)/cw*(far-near);
  }

  const lines = [`<b style="color:#fff">${fmtDist(dist)}</b>`];
  lenses.filter(l=>l.visible).forEach(lens => {
    const sensor = getSensorForLens(lens);
    const v = blurDisc(lens.focal, lens.aperture, focus, dist, sensor);
    const color = LENS_COLORS[lens.id % LENS_COLORS.length];
    lines.push(`<span style="color:${color}">▬</span> ${lens.name}: <b>${fmtVal(v)}</b>`);
  });

  tooltip.innerHTML = lines.join('<br>');
  tooltip.style.display = 'block';
  const tx = mx + 14 + 170 > area.clientWidth ? mx - 178 : mx + 14;
  tooltip.style.left = tx + 'px';
  tooltip.style.top  = (my - 10) + 'px';
});
document.getElementById('chartArea').addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function niceStep(raw) {
  const p = Math.pow(10, Math.floor(Math.log10(raw)));
  const f = raw/p;
  if (f<1.5) return p;
  if (f<3.5) return 2*p;
  if (f<7.5) return 5*p;
  return 10*p;
}

function fmtDist(d) {
  if (d >= 1000) return (d/1000).toFixed(1)+'km';
  if (d >= 100)  return d.toFixed(0)+'m';
  if (d >= 10)   return d.toFixed(1)+'m';
  return d.toFixed(2)+'m';
}

function fmtVal(v) {
  if (!Number.isFinite(v)) return '—';
  if (normMode === 'mm')   return v < 0.01 ? v.toExponential(2) : v.toFixed(3)+'mm';
  if (normMode === 'px')   return v.toFixed(1)+'px';
  if (normMode === 'frac') return (v*100).toFixed(3)+'%';
  return v.toFixed(3);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Build lens panel
document.getElementById('lensesPanel').innerHTML = '<button class="add-lens-btn">+ Add lens</button>';
document.querySelector('.add-lens-btn').addEventListener('click', () => addLens());

// Norm tabs
document.getElementById('normTabs').querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#normTabs .tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    normMode = btn.dataset.norm;
    scheduleRedraw();
  });
});

// Global inputs
['gFocus','gNear','gFar','gScale','chkDof','chkThresh','chkDiff','chkHyper'].forEach(id => {
  document.getElementById(id).addEventListener('input', scheduleRedraw);
  document.getElementById(id).addEventListener('change', scheduleRedraw);
});

// Resize
window.addEventListener('resize', scheduleRedraw);

// Seed two default lenses for comparison
addLens({ name: '50mm f/1.8 FF', focal:50, aperture:1.8, sensorIdx:4 });
addLens({ name: '25mm f/1.8 MFT', focal:25, aperture:1.8, sensorIdx:11 });
